services:
  parksonim-db:
    ports:
      - "127.0.0.1:5432:5432"

  parksonim-app:
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - parksonim_internal
